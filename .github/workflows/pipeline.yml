name: CI Pipeline

on:
  push:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Login to Docker Hub
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
          PASSWORD: ${{ secrets.DOCKER_TOKEN }}
        run: echo "$PASSWORD" | docker login -u "$USERNAME" --password-stdin

      - name: Build Docker image
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker build -t $USERNAME/my-app:latest .

      - name: Push Docker image
        env:
          USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: docker push $USERNAME/my-app:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy (main)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to PRODUCTION"
          echo "API_URL=https://api.prod.com"
          echo "DB_NAME=prod_db"

      - name: Deploy (dev)
        if: github.ref == 'refs/heads/dev'
        run: |
          echo "Deploying to DEVELOPMENT"
          echo "API_URL=https://api.dev.com"
          echo "DB_NAME=dev_db"
